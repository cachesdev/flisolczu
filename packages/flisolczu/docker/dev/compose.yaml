name: flisolczu2026
services:
  db:
    image: postgres:18.3
    env_file:
      - ../../.env
    restart: always
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: flisol
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
